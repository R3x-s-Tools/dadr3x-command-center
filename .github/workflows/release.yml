name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  source-zip:
    name: Source ZIP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source ZIP
        run: |
          python build/scripts/build_source_zip.py --version "${GITHUB_REF_NAME}"
          cd release
          sha256sum "DadR3x_Command_Center_${GITHUB_REF_NAME}_Source.zip" > "DadR3x_Command_Center_${GITHUB_REF_NAME}_Source.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: |
            release/*.zip
            release/*.sha256

  windows-app:
    name: Windows App
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows app
        shell: pwsh
        run: build/scripts/build_windows.ps1 -Version "${env:GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: |
            release/*.zip
            release/*.sha256

  macos-arm64-app:
    name: macOS App Apple Silicon
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Apple Silicon app
        run: bash build/scripts/build_mac.sh "${GITHUB_REF_NAME}_AppleSilicon"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-app
          path: |
            release/*.zip
            release/*.sha256

  macos-intel-app:
    name: macOS App Intel
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Intel app
        run: bash build/scripts/build_mac.sh "${GITHUB_REF_NAME}_Intel"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel-app
          path: |
            release/*.zip
            release/*.sha256

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - source-zip
      - windows-app
      - macos-arm64-app
      - macos-intel-app

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather release files
        run: |
          mkdir release-files
          find artifacts -type f -name "*.zip" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
